<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera App - Vercel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .camera-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            aspect-ratio: 16/9;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #video.mirror {
            transform: scaleX(-1);
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px 0;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 150px;
            color: white;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #10b981;
        }

        .btn-success:hover:not(:disabled) {
            background: #059669;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ef4444;
        }

        .btn-danger:hover:not(:disabled) {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6b7280;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #4b5563;
            transform: translateY(-2px);
        }

        .status {
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            font-weight: 500;
        }

        .status.info {
            background: #dbeafe;
            color: #1e40af;
        }

        .status.success {
            background: #d1fae5;
            color: #065f46;
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .preview {
            margin-top: 20px;
            text-align: center;
        }

        .preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .device-info {
            background: #f3f4f6;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-size: 14px;
            color: #4b5563;
        }

        .device-selector {
            margin: 15px 0;
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            width: 100%;
        }

        @media (max-width: 640px) {
            .container {
                padding: 20px;
            }
            
            button {
                min-width: 120px;
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 Camera App on Vercel</h1>
        
        <!-- สถานะ -->
        <div id="status" class="status info">
            🔄 พร้อมใช้งาน คลิก "เริ่มกล้อง" เพื่อเริ่มต้น
        </div>
        
        <!-- กล้อง -->
        <div class="camera-container">
            <video id="video" autoplay playsinline class="mirror"></video>
        </div>
        
        <!-- อุปกรณ์กล้อง (ซ่อนไว้ ถ้ามีกล้องเดียว) -->
        <select id="cameraSelect" class="device-selector" style="display: none;">
            <option value="">เลือกกล้อง...</option>
        </select>
        
        <!-- ปุ่มควบคุม -->
        <div class="controls">
            <button id="startBtn" class="btn-primary" onclick="startCamera()">
                🎥 เริ่มกล้อง
            </button>
            <button id="captureBtn" class="btn-success" onclick="capturePhoto()" disabled>
                📸 ถ่ายรูป
            </button>
            <button id="stopBtn" class="btn-danger" onclick="stopCamera()" disabled>
                ⏹️ หยุดกล้อง
            </button>
            <button id="switchBtn" class="btn-secondary" onclick="switchCamera()" style="display: none;">
                🔄 สลับกล้อง
            </button>
        </div>
        
        <!-- พื้นที่แสดงรูป -->
        <div id="preview" class="preview"></div>
        
        <!-- ปุ่มดาวน์โหลด (ซ่อนไว้) -->
        <div class="controls" id="downloadControls" style="display: none;">
            <button id="downloadBtn" class="btn-success" onclick="downloadPhoto()">
                ⬇️ ดาวน์โหลดรูป
            </button>
            <button id="shareBtn" class="btn-primary" onclick="sharePhoto()" style="display: none;">
                🔗 แชร์รูป
            </button>
        </div>
        
        <!-- ข้อมูลอุปกรณ์ -->
        <div class="device-info" id="deviceInfo"></div>
    </div>

    <script>
        // DOM Elements
        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const captureBtn = document.getElementById('captureBtn');
        const stopBtn = document.getElementById('stopBtn');
        const switchBtn = document.getElementById('switchBtn');
        const previewDiv = document.getElementById('preview');
        const downloadControls = document.getElementById('downloadControls');
        const cameraSelect = document.getElementById('cameraSelect');
        const deviceInfo = document.getElementById('deviceInfo');

        // State
        let mediaStream = null;
        let currentPhoto = null;
        let cameras = [];
        let currentCameraIndex = 0;
        let photoCount = 0;

        // อัพเดทสถานะ
        function updateStatus(message, type = 'info') {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }

        // แสดงข้อมูลอุปกรณ์
        async function updateDeviceInfo() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
                deviceInfo.innerHTML = '❌ เบราว์เซอร์ไม่รองรับการตรวจสอบอุปกรณ์';
                return;
            }

            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(d => d.kind === 'videoinput');
                
                let info = '📱 อุปกรณ์ที่พบ: ';
                if (videoDevices.length === 0) {
                    info += 'ไม่พบกล้อง';
                } else {
                    info += `${videoDevices.length} ตัว<br>`;
                    videoDevices.forEach((device, index) => {
                        info += `- กล้อง ${index + 1}: ${device.label || `Camera ${index + 1}`}<br>`;
                    });
                }
                deviceInfo.innerHTML = info;
                
                return videoDevices;
            } catch (error) {
                console.error('Error enumerating devices:', error);
                deviceInfo.innerHTML = '❌ ไม่สามารถตรวจสอบอุปกรณ์ได้';
            }
        }

        // ตรวจสอบและขออนุญาตกล้อง
        async function startCamera(deviceId = null) {
            try {
                updateStatus('📋 กำลังขออนุญาตใช้งานกล้อง...', 'info');
                
                // ตรวจสอบการรองรับ
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error('เบราว์เซอร์ของคุณไม่รองรับการใช้งานกล้อง');
                }

                // ตั้งค่าคุณภาพวิดีโอ
                const constraints = {
                    video: {
                        width: { ideal: 1920 },
                        height: { ideal: 1080 },
                        facingMode: 'user'
                    },
                    audio: false
                };

                // ถ้ามีการเลือก device id
                if (deviceId) {
                    constraints.video = {
                        ...constraints.video,
                        deviceId: { exact: deviceId }
                    };
                }

                // ขออนุญาตใช้กล้อง
                mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                
                // ต่อ stream เข้ากับ video
                video.srcObject = mediaStream;
                
                // รอให้ video พร้อม
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        resolve();
                    };
                });

                // เล่นวิดีโอ
                await video.play();
                
                // อัพเดทปุ่ม
                startBtn.disabled = true;
                captureBtn.disabled = false;
                stopBtn.disabled = false;
                
                // ตรวจสอบและแสดงปุ่มสลับกล้อง
                await checkCameras();
                
                updateStatus('✅ กล้องพร้อมใช้งานแล้ว', 'success');
                
                // อัพเดทข้อมูลอุปกรณ์
                updateDeviceInfo();
                
            } catch (error) {
                console.error('Camera error:', error);
                handleCameraError(error);
            }
        }

        // ตรวจสอบกล้องที่มี
        async function checkCameras() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                cameras = devices.filter(device => device.kind === 'videoinput');
                
                if (cameras.length > 1) {
                    switchBtn.style.display = 'inline-block';
                    
                    // อัพเดท dropdown
                    cameraSelect.innerHTML = '<option value="">เลือกกล้อง...</option>';
                    cameras.forEach((camera, index) => {
                        const option = document.createElement('option');
                        option.value = camera.deviceId;
                        option.text = camera.label || `กล้อง ${index + 1}`;
                        cameraSelect.appendChild(option);
                    });
                    cameraSelect.style.display = 'block';
                    
                    cameraSelect.onchange = (e) => {
                        if (e.target.value) {
                            switchToCamera(e.target.value);
                        }
                    };
                }
            } catch (error) {
                console.error('Error checking cameras:', error);
            }
        }

        // สลับไปใช้กล้องที่เลือก
        async function switchToCamera(deviceId) {
            if (mediaStream) {
                // หยุด stream ปัจจุบัน
                mediaStream.getTracks().forEach(track => track.stop());
                
                // เริ่มกล้องใหม่ด้วย device id ที่เลือก
                await startCamera(deviceId);
            }
        }

        // สลับกล้องหน้า/หลัง
        async function switchCamera() {
            if (cameras.length <= 1) {
                updateStatus('ไม่พบกล้องอื่นในระบบ', 'info');
                return;
            }
            
            currentCameraIndex = (currentCameraIndex + 1) % cameras.length;
            await switchToCamera(cameras[currentCameraIndex].deviceId);
        }

        // จัดการ error จากกล้อง
        function handleCameraError(error) {
            let message = '❌ ';
            
            switch(error.name) {
                case 'NotAllowedError':
                case 'PermissionDeniedError':
                    message += 'ไม่ได้รับอนุญาตให้ใช้กล้อง<br>';
                    message += '• คลิกที่ไอคอน🔒 ในช่อง URL<br>';
                    message += '• เลือก "อนุญาตให้ใช้กล้อง"<br>';
                    message += '• รีเฟรชหน้าเว็บ';
                    break;
                    
                case 'NotFoundError':
                    message += 'ไม่พบกล้องในอุปกรณ์นี้';
                    break;
                    
                case 'NotReadableError':
                    message += 'ไม่สามารถเข้าถึงกล้องได้ (อาจมีโปรแกรมอื่นใช้อยู่)';
                    break;
                    
                case 'OverconstrainedError':
                    message += 'ไม่สามารถใช้กล้องตามที่กำหนด';
                    break;
                    
                case 'NotSupportedError':
                    message += 'เบราว์เซอร์ไม่รองรับ';
                    break;
                    
                default:
                    message += error.message || 'เกิดข้อผิดพลาดไม่ทราบสาเหตุ';
            }
            
            updateStatus(message, 'error');
            
            // รีเซ็ตปุ่ม
            startBtn.disabled = false;
            captureBtn.disabled = true;
            stopBtn.disabled = true;
        }

        // ถ่ายรูป
        function capturePhoto() {
            if (!mediaStream) {
                updateStatus('❌ กรุณาเปิดกล้องก่อน', 'error');
                return;
            }
            
            try {
                // สร้าง canvas
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                // วาดภาพ
                const context = canvas.getContext('2d');
                
                // ถ้าต้องการภาพไม่กลับด้าน
                if (video.classList.contains('mirror')) {
                    context.translate(canvas.width, 0);
                    context.scale(-1, 1);
                }
                
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // แปลงเป็น base64
                currentPhoto = canvas.toDataURL('image/png');
                
                // เพิ่มจำนวนรูป
                photoCount++;
                
                // แสดงรูป
                previewDiv.innerHTML = `
                    <h3>📸 รูปที่ ${photoCount}:</h3>
                    <img src="${currentPhoto}" alt="Captured photo" onclick="window.open(this.src)">
                    <p style="color: #666; margin-top: 5px;">คลิกที่รูปเพื่อดูขนาดใหญ่</p>
                `;
                
                // แสดงปุ่มดาวน์โหลด
                downloadControls.style.display = 'flex';
                
                updateStatus(`✅ ถ่ายรูปที่ ${photoCount} เรียบร้อย`, 'success');
                
            } catch (error) {
                console.error('Capture error:', error);
                updateStatus('❌ ไม่สามารถถ่ายรูปได้', 'error');
            }
        }

        // ดาวน์โหลดรูป
        function downloadPhoto() {
            if (!currentPhoto) {
                updateStatus('❌ ไม่มีรูปให้ดาวน์โหลด', 'error');
                return;
            }
            
            try {
                const link = document.createElement('a');
                link.download = `camera-photo-${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.png`;
                link.href = currentPhoto;
                link.click();
                
                updateStatus('✅ กำลังดาวน์โหลดรูป', 'success');
            } catch (error) {
                console.error('Download error:', error);
                updateStatus('❌ ไม่สามารถดาวน์โหลดได้', 'error');
            }
        }

        // แชร์รูป (ถ้ารองรับ)
        async function sharePhoto() {
            if (!currentPhoto) {
                updateStatus('❌ ไม่มีรูปให้แชร์', 'error');
                return;
            }
            
            if (navigator.share) {
                try {
                    // แปลง base64 เป็น blob
                    const response = await fetch(currentPhoto);
                    const blob = await response.blob();
                    const file = new File([blob], 'camera-photo.png', { type: 'image/png' });
                    
                    await navigator.share({
                        title: 'รูปจากกล้อง',
                        text: 'รูปที่ถ่ายจาก Camera App',
                        files: [file]
                    });
                    
                    updateStatus('✅ แชร์รูปสำเร็จ', 'success');
                } catch (error) {
                    console.error('Share error:', error);
                    if (error.name !== 'AbortError') {
                        updateStatus('❌ ไม่สามารถแชร์รูปได้', 'error');
                    }
                }
            } else {
                // ถ้าเบราว์เซอร์ไม่รองรับการแชร์
                shareBtn.style.display = 'none';
                updateStatus('ℹ️ เบราว์เซอร์ของคุณไม่รองรับการแชร์', 'info');
            }
        }

        // หยุดกล้อง
        function stopCamera() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => {
                    track.stop();
                });
                mediaStream = null;
                
                video.srcObject = null;
                
                // รีเซ็ตปุ่ม
                startBtn.disabled = false;
                captureBtn.disabled = true;
                stopBtn.disabled = true;
                
                updateStatus('⏹️ หยุดใช้งานกล้องแล้ว', 'info');
            }
        }

        // ล้างข้อมูลเมื่อออกจากหน้า
        window.addEventListener('beforeunload', () => {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
        });

        // จัดการเมื่อเปลี่ยนแท็บ
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && mediaStream) {
                video.pause();
            } else if (!document.hidden && mediaStream && video.paused) {
                video.play().catch(e => console.log('Play error:', e));
            }
        });

        // ตรวจสอบ permission ตอนโหลดหน้า
        (async function init() {
            // อัพเดทข้อมูลอุปกรณ์
            await updateDeviceInfo();
            
            // ตรวจสอบการรองรับ Web Share API
            if (!navigator.share) {
                document.getElementById('shareBtn').style.display = 'none';
            }
            
            // ตรวจสอบ permission
            try {
                if (navigator.permissions && navigator.permissions.query) {
                    const permissionStatus = await navigator.permissions.query({ name: 'camera' });
                    
                    if (permissionStatus.state === 'granted') {
                        updateStatus('✅ มีสิทธิ์ใช้งานกล้องแล้ว', 'success');
                    } else if (permissionStatus.state === 'denied') {
                        updateStatus('❌ ถูกปฏิเสธการใช้งานกล้อง', 'error');
                    }
                }
            } catch (e) {
                console.log('Cannot query permission:', e);
            }
        })();

    </script>
</body>
</html>
