<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clinic App Fullscreen</title>
  <style>
    /* 1. กำหนดให้ไม่มีขอบและเต็มความสูงเสมอ */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden; /* ป้องกันการเลื่อนหลุดขอบ */
      background-color: #000; /* ใส่สีพื้นหลังกันขอบขาว */
    }

    /* 2. แก้ไขตรงนี้: เปลี่ยนจาก 900px เป็น 100% */
    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;  /* ขยายเต็มความกว้างหน้าจอ */
      height: 100%; /* ขยายเต็มความสูงหน้าจอ */
      border: none;
    }
  </style>
</head>
<body>

  <iframe 
    src="https://script.google.com/macros/s/AKfycbxmcxlvx0S2Pf-pfAB-KQpgG35f5vreE1B9vsXVwe6ixI0q9hr69Z4qIUCkM5rqKyY/exec" 
    title="Clinic App"
    allow="camera; microphone; display-capture; geolocation;" 
    allowfullscreen>
  </iframe>

</body>
</html>
