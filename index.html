<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>แอพถ่ายภาพพร้อมเครื่องมือแก้ไข</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .main-content {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .camera-section {
            flex: 2;
            min-width: 300px;
        }

        .editor-section {
            flex: 1;
            min-width: 250px;
            background: #f5f5f5;
            border-radius: 15px;
            padding: 20px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .editor-section h3 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            font-size: 18px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }

        .camera-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 4/3;
        }

        #video, #canvas, #editedCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        #video {
            display: block;
        }

        #canvas, #editedCanvas {
            display: none;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            flex: 1 1 auto;
            min-width: 120px;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #captureBtn {
            background: #4CAF50;
            color: white;
        }

        #captureBtn:hover:not(:disabled) {
            background: #45a049;
        }

        #downloadBtn {
            background: #2196F3;
            color: white;
        }

        #downloadBtn:hover:not(:disabled) {
            background: #1e87db;
        }

        #resetBtn {
            background: #f44336;
            color: white;
        }

        #resetBtn:hover:not(:disabled) {
            background: #da190b;
        }

        #switchCameraBtn {
            background: #FF9800;
            color: white;
        }

        #switchCameraBtn:hover:not(:disabled) {
            background: #e68900;
        }

        #applyEditBtn {
            background: #9C27B0;
            color: white;
            width: 100%;
            margin-top: 15px;
        }

        #applyEditBtn:hover:not(:disabled) {
            background: #7B1FA2;
        }

        #cancelEditBtn {
            background: #757575;
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .tool-group {
            margin-bottom: 20px;
            padding: 10px;
            background: white;
            border-radius: 10px;
        }

        .tool-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .tool-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .tool-btn {
            flex: 1;
            min-width: 60px;
            padding: 8px;
            font-size: 14px;
            background: #e0e0e0;
            color: #333;
        }

        .tool-btn:hover:not(:disabled) {
            background: #d0d0d0;
        }

        .tool-btn.active {
            background: #2196F3;
            color: white;
        }

        select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .preview-container {
            margin-top: 20px;
            text-align: center;
        }

        #photoPreview {
            max-width: 100%;
            max-height: 150px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: none;
        }

        .status {
            text-align: center;
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }

        .note {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            
            .editor-section {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 แอพถ่ายภาพพร้อมเครื่องมือแก้ไข</h1>
        
        <div class="main-content">
            <div class="camera-section">
                <div class="camera-container">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="canvas"></canvas>
                    <canvas id="editedCanvas"></canvas>
                </div>

                <div class="controls">
                    <button id="captureBtn">📷 ถ่ายภาพ</button>
                    <button id="downloadBtn" disabled>💾 บันทึก</button>
                    <button id="resetBtn">🔄 ถ่ายใหม่</button>
                    <button id="switchCameraBtn">🔄 สลับกล้อง</button>
                </div>

                <div class="preview-container">
                    <img id="photoPreview" alt="ตัวอย่างภาพ">
                </div>
            </div>

            <div class="editor-section">
                <h3>🎨 เครื่องมือแก้ไขภาพ</h3>
                
                <div class="tool-group">
                    <label>🔄 หมุนภาพ (Rotate)</label>
                    <div class="tool-buttons">
                        <button class="tool-btn" id="rotateLeftBtn" disabled>↪️ ซ้าย</button>
                        <button class="tool-btn" id="rotateRightBtn" disabled>↩️ ขวา</button>
                        <button class="tool-btn" id="rotate180Btn" disabled>🔄 180°</button>
                    </div>
                </div>

                <div class="tool-group">
                    <label>🪞 พลิกภาพ (Flip)</label>
                    <div class="tool-buttons">
                        <button class="tool-btn" id="flipHorizontalBtn" disabled>↔️ แนวนอน</button>
                        <button class="tool-btn" id="flipVerticalBtn" disabled>↕️ แนวตั้ง</button>
                    </div>
                </div>

                <div class="tool-group">
                    <label>✂️ ครอบตัด (Crop)</label>
                    <select id="cropAspectRatio" disabled>
                        <option value="free">อิสระ</option>
                        <option value="1:1">1:1 (สี่เหลี่ยมจัตุรัส)</option>
                        <option value="4:3">4:3 (มาตรฐาน)</option>
                        <option value="16:9">16:9 (จอกว้าง)</option>
                        <option value="3:4">3:4 (แนวตั้ง)</option>
                    </select>
                    <div class="tool-buttons">
                        <button class="tool-btn" id="startCropBtn" disabled>เริ่มครอบตัด</button>
                        <button class="tool-btn" id="applyCropBtn" disabled style="display:none;">ยืนยัน</button>
                        <button class="tool-btn" id="cancelCropBtn" disabled style="display:none;">ยกเลิก</button>
                    </div>
                </div>

                <button id="applyEditBtn" disabled>✅ นำไปใช้</button>
                <button id="cancelEditBtn" disabled>↩️ ยกเลิกการแก้ไข</button>
                
                <div class="note">
                    * ครอบตัด: คลิกและลากบนภาพเพื่อเลือกพื้นที่
                </div>
            </div>
        </div>

        <div class="status" id="status">
            กำลังเปิดกล้อง...
        </div>
    </div>

    <script>
        class CameraApp {
            constructor() {
                this.video = document.getElementById('video');
                this.canvas = document.getElementById('canvas');
                this.editedCanvas = document.getElementById('editedCanvas');
                this.photoPreview = document.getElementById('photoPreview');
                this.status = document.getElementById('status');
                
                this.captureBtn = document.getElementById('captureBtn');
                this.downloadBtn = document.getElementById('downloadBtn');
                this.resetBtn = document.getElementById('resetBtn');
                this.switchCameraBtn = document.getElementById('switchCameraBtn');
                this.applyEditBtn = document.getElementById('applyEditBtn');
                this.cancelEditBtn = document.getElementById('cancelEditBtn');
                
                // เครื่องมือแก้ไข
                this.rotateLeftBtn = document.getElementById('rotateLeftBtn');
                this.rotateRightBtn = document.getElementById('rotateRightBtn');
                this.rotate180Btn = document.getElementById('rotate180Btn');
                this.flipHorizontalBtn = document.getElementById('flipHorizontalBtn');
                this.flipVerticalBtn = document.getElementById('flipVerticalBtn');
                this.startCropBtn = document.getElementById('startCropBtn');
                this.applyCropBtn = document.getElementById('applyCropBtn');
                this.cancelCropBtn = document.getElementById('cancelCropBtn');
                this.cropAspectRatio = document.getElementById('cropAspectRatio');
                
                this.currentStream = null;
                this.currentFacingMode = 'environment';
                this.capturedImage = null;
                this.editedImage = null;
                this.originalImageData = null;
                
                // สถานะการแก้ไข
                this.rotation = 0;
                this.flipX = 1;
                this.flipY = 1;
                this.isCropping = false;
                this.cropStart = { x: 0, y: 0 };
                this.cropEnd = { x: 0, y: 0 };
                this.isSelecting = false;
                
                this.init();
            }

            async init() {
                try {
                    await this.startCamera();
                    this.setupEventListeners();
                } catch (error) {
                    this.showStatus('❌ ไม่สามารถเปิดกล้องได้: ' + error.message);
                    console.error('Error initializing camera:', error);
                }
            }

            async startCamera() {
                try {
                    if (this.currentStream) {
                        this.currentStream.getTracks().forEach(track => track.stop());
                    }

                    const constraints = {
                        video: {
                            facingMode: this.currentFacingMode,
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        },
                        audio: false
                    };

                    this.showStatus('กำลังขออนุญาตใช้กล้อง...');
                    
                    this.currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                    this.video.srcObject = this.currentStream;
                    
                    this.showStatus('✅ กล้องพร้อมใช้งาน');
                    
                    await new Promise((resolve) => {
                        this.video.onloadedmetadata = () => {
                            resolve();
                        };
                    });

                } catch (error) {
                    this.showStatus('❌ ไม่สามารถเปิดกล้องได้');
                    throw error;
                }
            }

            setupEventListeners() {
                this.captureBtn.addEventListener('click', () => this.capturePhoto());
                this.downloadBtn.addEventListener('click', () => this.downloadPhoto());
                this.resetBtn.addEventListener('click', () => this.resetCamera());
                this.switchCameraBtn.addEventListener('click', () => this.switchCamera());
                
                // เครื่องมือแก้ไข
                this.rotateLeftBtn.addEventListener('click', () => this.rotateImage(-90));
                this.rotateRightBtn.addEventListener('click', () => this.rotateImage(90));
                this.rotate180Btn.addEventListener('click', () => this.rotateImage(180));
                this.flipHorizontalBtn.addEventListener('click', () => this.flipImage('horizontal'));
                this.flipVerticalBtn.addEventListener('click', () => this.flipImage('vertical'));
                this.startCropBtn.addEventListener('click', () => this.startCrop());
                this.applyCropBtn.addEventListener('click', () => this.applyCrop());
                this.cancelCropBtn.addEventListener('click', () => this.cancelCrop());
                
                this.applyEditBtn.addEventListener('click', () => this.applyEdit());
                this.cancelEditBtn.addEventListener('click', () => this.cancelEdit());
                
                // Event listeners สำหรับการ crop
                this.editedCanvas.addEventListener('mousedown', (e) => this.startCropSelection(e));
                this.editedCanvas.addEventListener('mousemove', (e) => this.updateCropSelection(e));
                this.editedCanvas.addEventListener('mouseup', () => this.endCropSelection());
                this.editedCanvas.addEventListener('mouseleave', () => this.endCropSelection());
                
                // สำหรับ touch events บนมือถือ
                this.editedCanvas.addEventListener('touchstart', (e) => this.startCropSelection(e));
                this.editedCanvas.addEventListener('touchmove', (e) => this.updateCropSelection(e));
                this.editedCanvas.addEventListener('touchend', () => this.endCropSelection());
            }

            capturePhoto() {
                this.canvas.width = this.video.videoWidth;
                this.canvas.height = this.video.videoHeight;
                
                const context = this.canvas.getContext('2d');
                context.drawImage(this.video, 0, 0, this.canvas.width, this.canvas.height);
                
                this.capturedImage = this.canvas.toDataURL('image/png');
                this.originalImageData = this.capturedImage;
                
                // แสดงใน edited canvas
                this.loadImageToEditedCanvas(this.capturedImage);
                
                this.video.style.display = 'none';
                this.canvas.style.display = 'none';
                this.editedCanvas.style.display = 'block';
                
                this.captureBtn.disabled = true;
                this.downloadBtn.disabled = false;
                this.enableEditTools(true);
                
                this.showStatus('📸 ถ่ายภาพเรียบร้อย!');
            }

            loadImageToEditedCanvas(imageData) {
                const img = new Image();
                img.onload = () => {
                    this.editedCanvas.width = img.width;
                    this.editedCanvas.height = img.height;
                    const ctx = this.editedCanvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                };
                img.src = imageData;
            }

            rotateImage(degrees) {
                this.rotation = (this.rotation + degrees) % 360;
                this.applyTransformation();
            }

            flipImage(direction) {
                if (direction === 'horizontal') {
                    this.flipX *= -1;
                } else {
                    this.flipY *= -1;
                }
                this.applyTransformation();
            }

            applyTransformation() {
                const img = new Image();
                img.onload = () => {
                    // สร้าง canvas ชั่วคราวสำหรับการ transform
                    const tempCanvas = document.createElement('canvas');
                    const tempCtx = tempCanvas.getContext('2d');
                    
                    // คำนวณขนาดใหม่หลังจากหมุน
                    let width = img.width;
                    let height = img.height;
                    
                    if (this.rotation % 180 !== 0) {
                        [width, height] = [height, width];
                    }
                    
                    tempCanvas.width = width;
                    tempCanvas.height = height;
                    
                    tempCtx.translate(width / 2, height / 2);
                    tempCtx.rotate(this.rotation * Math.PI / 180);
                    tempCtx.scale(this.flipX, this.flipY);
                    tempCtx.drawImage(img, -img.width / 2, -img.height / 2);
                    
                    // อัปเดต edited canvas
                    this.editedCanvas.width = width;
                    this.editedCanvas.height = height;
                    const ctx = this.editedCanvas.getContext('2d');
                    ctx.drawImage(tempCanvas, 0, 0);
                };
                img.src = this.capturedImage;
            }

            startCrop() {
                this.isCropping = true;
                this.startCropBtn.style.display = 'none';
                this.applyCropBtn.style.display = 'inline-block';
                this.cancelCropBtn.style.display = 'inline-block';
                this.showStatus('✂️ คลิกและลากบนภาพเพื่อเลือกพื้นที่ครอบตัด');
            }

            startCropSelection(e) {
                if (!this.isCropping) return;
                
                e.preventDefault();
                const rect = this.editedCanvas.getBoundingClientRect();
                const scaleX = this.editedCanvas.width / rect.width;
                const scaleY = this.editedCanvas.height / rect.height;
                
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                
                this.cropStart.x = (clientX - rect.left) * scaleX;
                this.cropStart.y = (clientY - rect.top) * scaleY;
                this.cropEnd.x = this.cropStart.x;
                this.cropEnd.y = this.cropStart.y;
                this.isSelecting = true;
            }

            updateCropSelection(e) {
                if (!this.isCropping || !this.isSelecting) return;
                
                e.preventDefault();
                const rect = this.editedCanvas.getBoundingClientRect();
                const scaleX = this.editedCanvas.width / rect.width;
                const scaleY = this.editedCanvas.height / rect.height;
                
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                
                this.cropEnd.x = Math.max(0, Math.min(this.editedCanvas.width, (clientX - rect.left) * scaleX));
                this.cropEnd.y = Math.max(0, Math.min(this.editedCanvas.height, (clientY - rect.top) * scaleY));
                
                this.drawCropRectangle();
            }

            endCropSelection() {
                this.isSelecting = false;
            }

            drawCropRectangle() {
                const ctx = this.editedCanvas.getContext('2d');
                
                // โหลดภาพเดิมอีกครั้ง
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, 0, 0);
                    
                    // วาดสี่เหลี่ยมครอบตัด
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    
                    const x = Math.min(this.cropStart.x, this.cropEnd.x);
                    const y = Math.min(this.cropStart.y, this.cropEnd.y);
                    const width = Math.abs(this.cropEnd.x - this.cropStart.x);
                    const height = Math.abs(this.cropEnd.y - this.cropStart.y);
                    
                    ctx.strokeRect(x, y, width, height);
                    
                    // วาดพื้นที่มืดรอบนอก
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(0, 0, this.editedCanvas.width, y);
                    ctx.fillRect(0, y, x, height);
                    ctx.fillRect(x + width, y, this.editedCanvas.width - x - width, height);
                    ctx.fillRect(0, y + height, this.editedCanvas.width, this.editedCanvas.height - y - height);
                };
                img.src = this.capturedImage;
            }

            applyCrop() {
                const x = Math.min(this.cropStart.x, this.cropEnd.x);
                const y = Math.min(this.cropStart.y, this.cropEnd.y);
                const width = Math.abs(this.cropEnd.x - this.cropStart.x);
                const height = Math.abs(this.cropEnd.y - this.cropStart.y);
                
                if (width < 10 || height < 10) {
                    this.showStatus('❌ พื้นที่ครอบตัดเล็กเกินไป');
                    return;
                }
                
                // สร้าง canvas ใหม่สำหรับภาพที่ครอบตัด
                const cropCanvas = document.createElement('canvas');
                cropCanvas.width = width;
                cropCanvas.height = height;
                const cropCtx = cropCanvas.getContext('2d');
                
                cropCtx.drawImage(this.editedCanvas, x, y, width, height, 0, 0, width, height);
                
                // อัปเดต capturedImage
                this.capturedImage = cropCanvas.toDataURL('image/png');
                
                // รีเซ็ตค่า transformations
                this.rotation = 0;
                this.flipX = 1;
                this.flipY = 1;
                
                // โหลดภาพใหม่
                this.loadImageToEditedCanvas(this.capturedImage);
                
                // ปิดโหมด crop
                this.cancelCrop();
                this.showStatus('✅ ครอบตัดเรียบร้อย');
            }

            cancelCrop() {
                this.isCropping = false;
                this.startCropBtn.style.display = 'inline-block';
                this.applyCropBtn.style.display = 'none';
                this.cancelCropBtn.style.display = 'none';
                
                // โหลดภาพเดิมกลับมา
                this.loadImageToEditedCanvas(this.capturedImage);
            }

            applyEdit() {
                // บันทึกภาพที่แก้ไขแล้ว
                this.editedImage = this.editedCanvas.toDataURL('image/png');
                this.capturedImage = this.editedImage;
                this.photoPreview.src = this.editedImage;
                this.photoPreview.style.display = 'block';
                
                this.showStatus('✅ นำการแก้ไขไปใช้เรียบร้อย');
            }

            cancelEdit() {
                // โหลดภาพเดิมกลับมา
                this.loadImageToEditedCanvas(this.originalImageData);
                this.capturedImage = this.originalImageData;
                
                // รีเซ็ตค่าแก้ไข
                this.rotation = 0;
                this.flipX = 1;
                this.flipY = 1;
                
                this.showStatus('↩️ ยกเลิกการแก้ไข');
            }

            downloadPhoto() {
                const imageToDownload = this.editedImage || this.capturedImage;
                if (!imageToDownload) return;
                
                const link = document.createElement('a');
                link.download = `ภาพถ่าย-${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.png`;
                link.href = imageToDownload;
                link.click();
                
                this.showStatus('💾 บันทึกภาพเรียบร้อย!');
            }

            resetCamera() {
                this.video.style.display = 'block';
                this.canvas.style.display = 'none';
                this.editedCanvas.style.display = 'none';
                this.photoPreview.style.display = 'none';
                
                this.captureBtn.disabled = false;
                this.downloadBtn.disabled = true;
                this.enableEditTools(false);
                
                this.capturedImage = null;
                this.editedImage = null;
                this.originalImageData = null;
                
                // รีเซ็ตค่าแก้ไข
                this.rotation = 0;
                this.flipX = 1;
                this.flipY = 1;
                
                // ซ่อนปุ่ม crop ถ้าค้างอยู่
                this.cancelCrop();
                
                this.showStatus('🔄 พร้อมถ่ายภาพใหม่');
            }

            enableEditTools(enabled) {
                const tools = [
                    this.rotateLeftBtn,
                    this.rotateRightBtn,
                    this.rotate180Btn,
                    this.flipHorizontalBtn,
                    this.flipVerticalBtn,
                    this.startCropBtn,
                    this.cropAspectRatio,
                    this.applyEditBtn,
                    this.cancelEditBtn
                ];
                
                tools.forEach(tool => {
                    tool.disabled = !enabled;
                });
            }

            async switchCamera() {
                this.currentFacingMode = this.currentFacingMode === 'environment' ? 'user' : 'environment';
                
                this.showStatus('🔄 กำลังสลับกล้อง...');
                
                try {
                    await this.startCamera();
                    this.resetCamera();
                    this.showStatus(`✅ เปลี่ยนเป็นกล้อง${this.currentFacingMode === 'environment' ? 'หลัง' : 'หน้า'}เรียบร้อย`);
                } catch (error) {
                    this.showStatus('❌ ไม่สามารถสลับกล้องได้');
                    console.error('Error switching camera:', error);
                }
            }

            showStatus(message) {
                this.status.textContent = message;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                document.getElementById('status').textContent = '❌ เบราว์เซอร์ของคุณไม่รองรับการเข้าถึงกล้อง';
                return;
            }
            
            new CameraApp();
        });
    </script>
</body>
</html>
